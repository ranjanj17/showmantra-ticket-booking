spring:
  application:
    name: showmantra-backend
  ai:
    retry:
      max-attempts: 4
      backoff:
        initial-interval: 5000
        multiplier: 2
        max-interval: 20000
    openai:
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      chat:
        options:
          model: gemini-2.5-flash
      embedding:
        enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/showmantra_db?createDatabaseIfNotExist=true
    username: root
    password: ranjan@1
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true

jwt:
  # In production, this is overridden by the JWT_SECRET environment variable.
  # The hardcoded value here is strictly a fallback for local development.
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

